<!-- Why Files Database — favicon. Saucer at top, tractor beam sweeping
     down to the bottom edge so the searchlight reads even at 16x16.
     Square viewBox with rounded-rect plate, tiny stars, a single abductee
     silhouette dot at the bottom of the beam. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="fvbg" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#1a0a2a"/>
      <stop offset="1" stop-color="#05040a"/>
    </radialGradient>
    <linearGradient id="fvbeam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0"   stop-color="#8affc0" stop-opacity="0.9"/>
      <stop offset="0.7" stop-color="#8affc0" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#8affc0" stop-opacity="0"/>
    </linearGradient>
    <filter id="fvGlow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Plate + sky -->
  <rect width="256" height="256" rx="48" fill="url(#fvbg)"/>
  <g fill="#fff">
    <circle cx="34" cy="40" r="2"/>
    <circle cx="220" cy="46" r="1.8"/>
    <circle cx="192" cy="24" r="1.2"/>
    <circle cx="60" cy="18" r="1.2"/>
    <circle cx="232" cy="120" r="1.4"/>
    <circle cx="20" cy="132" r="1.4"/>
  </g>

  <!-- Tractor beam — sweeps to the bottom edge -->
  <path d="M74 104 L6 248 L250 248 L182 104 Z" fill="url(#fvbeam)"/>

  <!-- Abductee silhouette at the beam's foot -->
  <ellipse cx="128" cy="232" rx="18" ry="3" fill="#000" opacity="0.55"/>
  <path d="M114,228 L112,220 L116,218 L118,224 L138,224 L140,218 L144,220 L142,228 L140,232 L116,232 Z"
        fill="#1a0a2a"/>

  <!-- Saucer -->
  <g transform="translate(128,82)">
    <ellipse cx="0" cy="22" rx="96" ry="12" fill="#0a0810"/>
    <ellipse cx="0" cy="18" rx="88" ry="20" fill="#6a4a90"/>
    <ellipse cx="0" cy="12" rx="76" ry="16" fill="#9a7ac0"/>
    <ellipse cx="0" cy="4" rx="44" ry="16" fill="#c0a0e8"/>
    <ellipse cx="-8" cy="-2" rx="22" ry="7" fill="#e8d8ff" opacity="0.9"/>
    <circle cx="-60" cy="20" r="6" fill="#ff5070"/>
    <circle cx="-34" cy="24" r="6" fill="#50ff90"/>
    <circle cx="-8"  cy="26" r="6" fill="#ffd050"/>
    <circle cx="18"  cy="26" r="6" fill="#50a0ff"/>
    <circle cx="44"  cy="24" r="6" fill="#ff5070"/>
    <circle cx="70"  cy="20" r="6" fill="#50ff90"/>
    <ellipse cx="-60" cy="20" rx="14" ry="14" fill="#ff5070" opacity="0.4" filter="url(#fvGlow)"/>
    <ellipse cx="-8"  cy="26" rx="14" ry="14" fill="#ffd050" opacity="0.4" filter="url(#fvGlow)"/>
    <ellipse cx="70"  cy="20" rx="14" ry="14" fill="#50ff90" opacity="0.4" filter="url(#fvGlow)"/>
  </g>
</svg>
