       (textLength is unreliable in rasterizers — transform scale is not). -->
  <g transform="translate(540,230)" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" fill="#fff">
    <text x="0" y="0" font-size="20" font-weight="700" letter-spacing="7" fill="#8affc0">★ AN INDEPENDENT RESEARCH INDEX ★</text>
