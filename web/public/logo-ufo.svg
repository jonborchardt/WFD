<!-- Why Files Database — graphical UFO-with-beam mark.
     viewBox 380×300, saucer centered at (190,80), beam extends down to y≈280.
     Color values are baked-in (not currentColor) because the mark is
     multicolor — the lights are the point. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="ufoBeam" cx="0.5" cy="0" r="1" fx="0.5" fy="0">
      <stop offset="0" stop-color="#8affc0" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#8affc0" stop-opacity="0"/>
    </radialGradient>
    <filter id="ufoGlow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <g transform="translate(190,80)">
    <!-- Beam -->
    <path d="M-70 30 L-190 200 L190 200 L70 30 Z" fill="url(#ufoBeam)"/>
    <!-- Saucer hull -->
    <ellipse cx="0" cy="25" rx="110" ry="14" fill="#0a0810"/>
    <ellipse cx="0" cy="20" rx="100" ry="22" fill="#6a4a90"/>
    <ellipse cx="0" cy="14" rx="88" ry="18" fill="#9a7ac0"/>
    <!-- Dome -->
    <ellipse cx="0" cy="5" rx="50" ry="18" fill="#c0a0e8"/>
    <ellipse cx="-10" cy="-2" rx="26" ry="8" fill="#e8d8ff" opacity="0.85"/>
    <!-- Running lights -->
    <circle cx="-70" cy="22" r="5" fill="#ff5070"/>
    <circle cx="-40" cy="26" r="5" fill="#50ff90"/>
    <circle cx="-10" cy="28" r="5" fill="#ffd050"/>
    <circle cx="20" cy="28" r="5" fill="#50a0ff"/>
    <circle cx="50" cy="26" r="5" fill="#ff5070"/>
    <circle cx="80" cy="22" r="5" fill="#50ff90"/>
    <!-- Glow -->
    <ellipse cx="-70" cy="22" rx="12" ry="12" fill="#ff5070" opacity="0.35" filter="url(#ufoGlow)"/>
    <ellipse cx="-40" cy="26" rx="12" ry="12" fill="#50ff90" opacity="0.35" filter="url(#ufoGlow)"/>
    <ellipse cx="80"  cy="22" rx="12" ry="12" fill="#50ff90" opacity="0.35" filter="url(#ufoGlow)"/>
  </g>
</svg>
