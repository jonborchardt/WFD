name: deploy-pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/catalog/**"
      - "data/entities/**"
      - "data/relations/**"
      - "data/graph/**"
      - "data/claims/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Test
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build

      - name: Layer data into dist/
        run: |
          mkdir -p web/dist/data
          for d in catalog entities relations graph claims; do
            if [ -d "data/$d" ]; then
              cp -r "data/$d" "web/dist/data/$d"
            fi
          done
          # Transcripts are large; include only if the directory is under 500 MB
          if [ -d data/transcripts ]; then
            size=$(du -sm data/transcripts | cut -f1)
            if [ "$size" -lt 500 ]; then
              cp -r data/transcripts web/dist/data/transcripts
            else
              echo "skipping transcripts/ (${size} MB)"
            fi
          fi
          touch web/dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
