name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "data/catalog/**"
      - "data/transcripts/**"
      - "data/nlp/**"
      - "src/ui/client/**"
      - "src/ui/query.js"
      - "scripts/static-shim.js"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp -r data/catalog _site/data/
          cp -r data/transcripts _site/data/
          cp -r data/nlp _site/data/
          cp src/ui/client/index.html _site/index.html
          cp src/ui/client/index.html _site/404.html
          cp src/ui/client/app.js _site/client.js
          cp src/ui/query.js _site/query.js
          cp scripts/static-shim.js _site/static-shim.js
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
