name: deploy-pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/catalog/**"
      - "data/entities/**"
      - "data/relations/**"
      - "data/graph/**"
      - "data/claims/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Install web deps BEFORE root deps. Root pulls vitest 3 → vite 6 →
      # esbuild 0.27.x; web pins esbuild 0.21.5 (via vite 5). If root
      # installs first, web's esbuild postinstall walks up via require.resolve
      # and copies the wrong-version binary out of the root's node_modules,
      # then fails its own version check.
      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install root deps (for sitemap CLI)
        run: npm ci

      # Pin esbuild to web's own 0.21.5 binary. Without this, esbuild's host
      # JS does require.resolve('@esbuild/linux-x64/bin/esbuild') from
      # web/node_modules/esbuild/lib/, walks up past web/node_modules/ (the
      # lockfile only carries @esbuild/win32-x64), and finds the root's
      # 0.27.7 binary (vitest 3 → vite 6) → host/binary version mismatch.
      - name: Test
        working-directory: web
        env:
          ESBUILD_BINARY_PATH: ${{ github.workspace }}/web/node_modules/esbuild/bin/esbuild
        run: npm test

      - name: Build
        working-directory: web
        env:
          ESBUILD_BINARY_PATH: ${{ github.workspace }}/web/node_modules/esbuild/bin/esbuild
        run: npm run build

      - name: Layer data into dist/
        run: |
          mkdir -p web/dist/data
          for d in catalog entities relations graph claims; do
            if [ -d "data/$d" ]; then
              cp -r "data/$d" "web/dist/data/$d"
            fi
          done
          # Transcripts are large; include only if the directory is under 500 MB
          if [ -d data/transcripts ]; then
            size=$(du -sm data/transcripts | cut -f1)
            if [ "$size" -lt 500 ]; then
              cp -r data/transcripts web/dist/data/transcripts
            else
              echo "skipping transcripts/ (${size} MB)"
            fi
          fi
          touch web/dist/.nojekyll

      - name: Generate sitemap.xml
        env:
          SITE_BASE_URL: https://jonborchardt.github.io/WFD
        run: npx tsx scripts/build-sitemap.ts --out web/dist/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
